{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">XML 数据导入</h2>

    <form method="POST" action="/xml-import">
        <div class="form-group">
            <label for="xml_data">XML 数据</label>
            <textarea id="xml_data" name="xml_data" class="form-input" rows="12" placeholder="输入 XML 数据..." style="font-family:monospace;font-size:13px;resize:vertical;">{{ request.form.get('xml_data', '') }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">导 入</button>
    </form>

    {% if result %}
    <div style="margin-top:20px;padding-top:20px;border-top:1px solid #eee;">
        <h3 style="margin-bottom:12px;font-size:16px;">解析结果</h3>
        <pre style="background:#f5f5f5;padding:16px;border-radius:6px;font-family:'Courier New',monospace;font-size:13px;line-height:1.6;overflow:auto;max-height:500px;white-space:pre-wrap;">{{ result }}</pre>
    </div>
    {% endif %}

    <div style="text-align:center;margin-top:16px;">
        <a href="/" style="color:#667eea;font-size:14px;">返回首页</a>
    </div>
</div>
{% endblock %}
