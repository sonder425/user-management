<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">用户管理系统</a>
        <div class="navbar-menu">
            {% if session.get('username') %}
                <span class="navbar-welcome">欢迎，{{ session['username'] }}</span>
                <a href="/profile?user_id=1" class="navbar-link">个人中心</a>
                <a href="/upload" class="navbar-link">上传头像</a>
                <a href="/page?name=help" class="navbar-link">帮助中心</a>
                <a href="/ping" class="navbar-link">Ping测试</a>
                <a href="/logout" class="navbar-link">退出</a>
            {% else %}
                <a href="/login" class="navbar-link">登录</a>
                <a href="/register" class="navbar-link">注册</a>
            {% endif %}
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
